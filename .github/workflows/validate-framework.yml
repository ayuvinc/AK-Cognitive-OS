name: Validate Framework

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run framework structural validation
        run: bash scripts/validate-framework.sh

      - name: Run Python validator suite (source)
        run: python3 validators/runner.py .

      - name: Smoke test — bootstrap fresh project
        run: |
          bash scripts/bootstrap-project.sh /tmp/ak-cogos-smoke --non-interactive
          echo "Bootstrap exit: $?"

      - name: Smoke test — dry-run remediation
        run: |
          bash scripts/remediate-project.sh /tmp/ak-cogos-smoke --dry-run
          echo "Dry-run exit: $?"

      - name: Run Python validator suite (bootstrapped project)
        run: python3 validators/runner.py /tmp/ak-cogos-smoke
